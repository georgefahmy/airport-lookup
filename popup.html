<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 12px;
      margin: 0;
      background-color: #1e252b;
      color: #ffffff;
    }
    .menu-header {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
      text-align: center;
      color: #00cbc6;
    }
    .toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      border-bottom: 1px solid #343a40;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #747d8c; transition: .2s; border-radius: 20px;
    }
    .slider:before {
      position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
      background-color: white; transition: .2s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #009688; }
    input:checked + .slider:before { transform: translateX(20px); }

    /* Continent Section Styling */
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a4b0be;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .continent-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 12px;
    }
    .continent-grid label {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    .continent-grid input {
      margin-righT: 6px;
      accent-color: #009688;
    }
  </style>
</head>
<body>
  <div class="menu-header">SkyVector Lookup</div>

  <div class="toggle-container">
    <span>Enable Highlights</span>
    <label class="switch">
      <input type="checkbox" id="toggle-extension" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="section-title">Filter by Continent</div>
  <div class="continent-grid">
    <label><input type="checkbox" class="cont-box" value="NA" checked> N. America</label>
    <label><input type="checkbox" class="cont-box" value="EU" checked> Europe</label>
    <label><input type="checkbox" class="cont-box" value="AS" checked> Asia</label>
    <label><input type="checkbox" class="cont-box" value="SA" checked> S. America</label>
    <label><input type="checkbox" class="cont-box" value="AF" checked> Africa</label>
    <label><input type="checkbox" class="cont-box" value="OC" checked> Oceania</label>
    <label><input type="checkbox" class="cont-box" value="AN" checked> Antarctica</label>
  </div>
  <hr style="border: 0; border-top: 1px solid #343a40; margin: 12px 0;">

  <button id="update-btn" style="width: 100%; background-color: #00cbc6; color: #1e252b; border: none; padding: 8px; font-weight: bold; border-radius: 4px; cursor: pointer;">
    🔄 Update Airport Database
  </button>
  <div id="update-status" style="font-size: 11px; color: #a4b0be; text-align: center; margin-top: 6px;"></div>

  <script src="popup.js"></script>
</body>
</html>
